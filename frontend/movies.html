<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tất cả phim – Fishsauce Cinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <a class="brand" href="index.html" aria-label="Fishsauce Cinema home">
                <span class="brand-mark">FS</span>
                <span class="brand-text">
                    <strong>Fishsauce Cinema</strong>
                    <small>Đặt vé nhanh, xem phim gọn</small>
                </span>
            </a>
            <nav class="topbar-nav">
                <a href="index.html">← Trang chủ</a>
            </nav>
            <div id="auth-nav" class="topbar-auth"></div>
        </header>

        <main style="padding:32px 24px;max-width:1200px;margin:0 auto">
            <div style="margin-bottom:24px">
                <h1 style="margin:0 0 4px;font-size:1.75rem">Tất cả phim</h1>
                <p style="color:var(--muted);margin:0">Khám phá toàn bộ thư viện phim của Fishsauce Cinema</p>
            </div>

            <!-- Tab bar -->
            <div class="movies-tabs" style="display:flex;gap:8px;margin-bottom:24px;border-bottom:1px solid var(--border,#eee);padding-bottom:0">
                <button class="tab-pill active" data-status="Đang chiếu" style="padding:8px 20px;border:none;background:none;cursor:pointer;font-weight:600;border-bottom:2px solid var(--primary,#e05c3a);color:var(--primary,#e05c3a)">Đang chiếu</button>
                <button class="tab-pill" data-status="Sắp chiếu" style="padding:8px 20px;border:none;background:none;cursor:pointer;font-weight:500;color:var(--muted);border-bottom:2px solid transparent">Sắp chiếu</button>
            </div>

            <p id="movies-count" style="color:var(--muted);font-size:.875rem;margin:0 0 16px"></p>
            <section id="all-movies" class="movie-grid" aria-live="polite"></section>
            <nav id="movies-pagination" class="movies-pagination" aria-label="Chuyển trang phim"></nav>
        </main>
    </div>

    <!-- Movie detail modal (reused from app.js) -->

    <script src="js/auth.js"></script>
    <script src="js/movies.js"></script>
</body>
</html>
